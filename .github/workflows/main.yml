name: ci/cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Set VERCEL_ENABLED to 'true' in repo vars (Settings → Variables → Actions)
  # once you have VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets configured
  VERCEL_ENABLED: ${{ vars.VERCEL_ENABLED || 'false' }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm lint

      - name: unit tests
        run: pnpm test
        env:
          JWT_SECRET: ci-test-secret

      - name: check drizzle migrations
        run: pnpm db:check

      - name: build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://x:x@localhost:5432/x
          JWT_SECRET: ci-test-secret

      - name: security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  preview:
    name: preview deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && vars.VERCEL_ENABLED == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install vercel cli
        run: pnpm add -g vercel

      - name: deploy preview
        id: preview
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: comment preview url on pr
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Preview: ${{ steps.preview.outputs.url }}`
            })

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.event_name == 'push' && vars.VERCEL_ENABLED == 'true'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install
        run: pnpm install --frozen-lockfile

      - name: install vercel cli
        run: pnpm add -g vercel

      - name: deploy to vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: health check
        run: |
          curl -f https://${{ vars.PRODUCTION_URL }}/api/health \
            || echo "set PRODUCTION_URL repo var to enable health check"
        continue-on-error: true
